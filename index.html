<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний портал | Авторизація</title>
    <style>
        :root {
            --primary-wood: #8B5A2B; /* Теплий колір дерева */
            --dark-green: #2E4A3D;   /* Колір хвої/еко */
            --light-bg: #F9F6F0;     /* Світлий фон під дерево */
            --text-dark: #333333;
            --text-light: #777777;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--light-bg); 
            background-image: radial-gradient(#e2d9c8 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background-color: #ffffff; 
            padding: 40px 40px 50px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(139, 90, 43, 0.15); 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
            border-top: 5px solid var(--primary-wood);
            box-sizing: border-box;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 40px;
            color: var(--dark-green);
            margin-bottom: 10px;
        }

        h2 { 
            color: var(--text-dark); 
            margin: 0 0 8px 0;
            font-size: 24px;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 5px;
            font-weight: 600;
        }

        input { 
            width: 100%; 
            padding: 14px 15px; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-wood);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.1);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--dark-green); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            transition: background-color 0.3s, transform 0.1s; 
            margin-top: 10px;
        }

        button:hover { 
            background-color: #1f332a; 
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled { 
            background-color: #95a5a6; 
            cursor: not-allowed; 
            transform: none;
        }

        #message { 
            font-size: 14px; 
            margin-top: 20px; 
            padding: 10px;
            border-radius: 6px;
            display: none; 
            font-weight: 500;
        }

        .error { 
            background-color: #feeceb;
            color: #e74c3c; 
            border: 1px solid #f5c6c4;
        }

        .success { 
            background-color: #eafaf1;
            color: #27ae60; 
            border: 1px solid #c3f0d5;
        }
        
        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }
        
        .footer-links a {
            color: var(--primary-wood);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .footer-links a:hover {
            color: var(--dark-green);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <div class="logo-icon">🌲</div>
        <h2>Wood Agency</h2>
        <p class="subtitle">Адаптація для нових співробітників</p>
    </div>

    <div class="input-group">
        <label for="loginField">ЛОГІН</label>
        <input type="text" id="loginField" placeholder="Ваш робочий логін">
    </div>
    
    <div class="input-group">
        <label for="passField">ПАРОЛЬ</label>
        <input type="password" id="passField" placeholder="••••••••">
    </div>

    <button id="loginBtn" onclick="attemptLogin()">Увійти в систему</button>
    <div id="message"></div>
    
    <div class="footer-links">
        <a href="#">Забули пароль? Зверніться до адміністратора</a>
    </div>
</div>

<script>
    // Ваше посилання на Google Apps Script
   const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHbCDUOeyr_Kt3Hm0I7AOmsT_8xGPDruz5SG4b0TcVXkiAm5qGMUJLgR0oXZK2MTkt/exec";
    // Додаємо можливість натискати Enter для входу
    document.getElementById("passField").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            attemptLogin();
        }
    });

    async function attemptLogin() {
        const login = document.getElementById("loginField").value.trim();
        const password = document.getElementById("passField").value.trim();
        const msgDiv = document.getElementById("message");
        const btn = document.getElementById("loginBtn");

        if (!login || !password) {
            showMessage("Будь ласка, заповніть усі поля", "error");
            return;
        }

        // Анімація завантаження на кнопці
        btn.disabled = true;
        btn.innerHTML = "⏳ Перевірка даних...";

        try {
            // Відправка POST-запиту в Google Таблицю
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" }, 
                body: JSON.stringify({ login: login, password: password })
            });

            const result = await response.json();

            if (result.status === "success") {
                showMessage(`Вітаємо, ${result.name}!`, "success");
                btn.innerHTML = "✅ Успішно";
                
                // Зберігаємо дані сесії
                localStorage.setItem("user_login", login);
                localStorage.setItem("user_name", result.name);
                localStorage.setItem("user_level", result.level);

                // Через 1.5 секунди перекидаємо на сторінку з уроками
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1500);
            } else {
                // Якщо скрипт повернув помилку (невірний логін/пароль)
                showMessage("Невірний логін або пароль", "error");
                btn.disabled = false;
                btn.innerHTML = "Увійти в систему";
            }
        } catch (error) {
            console.error("Помилка:", error);
            showMessage("Помилка підключення до бази даних. Спробуйте ще раз.", "error");
            btn.disabled = false;
            btn.innerHTML = "Увійти в систему";
        }
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById("message");
        msgDiv.textContent = text;
        msgDiv.className = type;
        msgDiv.style.display = "block";
    }
</script>

</body>
</html>
